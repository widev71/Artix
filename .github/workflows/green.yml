name: 🌿 GitHub Greening

on:
  schedule:
    - cron: '0 17 * * *'  # Jalan sekali sehari jam 00:00 WIB
  workflow_dispatch:

jobs:
  green-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "ducky"
          git config user.email "gkompor789@gmail.com"

      - name: Random commits of the day
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TZ="Asia/Jakarta"

          # Acak jumlah commit hari ini: antara 1 sampai 25
          COMMIT_COUNT=$((RANDOM % 25 + 1))
          echo "🎲 Hari ini akan membuat $COMMIT_COUNT commit"

          MESSAGES=(
            "chore: update activity log"
            "docs: refresh README"
            "chore: sync latest changes"
            "docs: update project notes"
            "chore: routine maintenance"
            "docs: minor content update"
            "chore: housekeeping"
            "docs: keep things fresh"
            "chore: daily sync"
            "docs: update timestamp"
            "fix: minor adjustments"
            "refactor: clean up notes"
            "chore: tidy up"
            "docs: small improvements"
            "chore: scheduled update"
          )

          for i in $(seq 1 $COMMIT_COUNT); do
            TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S %Z")
            MSG_INDEX=$((RANDOM % ${#MESSAGES[@]}))
            COMMIT_MSG="${MESSAGES[$MSG_INDEX]}"

            # Isi README berbeda tiap commit agar selalu ada perubahan
            echo "<!-- sync: $i/$COMMIT_COUNT | $TIMESTAMP -->" > README.md
            echo "" >> README.md
            echo "# Activity Log" >> README.md
            echo "" >> README.md
            echo "Sync **#$i** of **$COMMIT_COUNT** &nbsp;|&nbsp; $TIMESTAMP" >> README.md
            echo "" >> README.md
            echo "> Automated daily activity tracker" >> README.md

            git add README.md
            git commit -m "$COMMIT_MSG (#$i)"
            sleep 1
          done

          git push origin main
          echo "✅ Selesai! Total $COMMIT_COUNT commit hari ini."

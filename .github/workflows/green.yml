name: 🌿 GitHub Greening

# Jadwal acak: berjalan 18x sehari di jam-jam berbeda (pagi, siang, malam)
on:
  schedule:
    # Pagi (05:00 - 09:00 WIB = 22:00 - 02:00 UTC)
    - cron: '7 22 * * *'   # 05:07 WIB
    - cron: '23 22 * * *'  # 05:23 WIB
    - cron: '51 23 * * *'  # 06:51 WIB
    - cron: '14 0 * * *'   # 07:14 WIB
    - cron: '38 0 * * *'   # 07:38 WIB
    - cron: '5 1 * * *'    # 08:05 WIB
    - cron: '47 1 * * *'   # 08:47 WIB
    - cron: '29 2 * * *'   # 09:29 WIB

    # Siang (10:00 - 14:00 WIB = 03:00 - 07:00 UTC)
    - cron: '11 3 * * *'   # 10:11 WIB
    - cron: '44 4 * * *'   # 11:44 WIB
    - cron: '17 5 * * *'   # 12:17 WIB
    - cron: '52 5 * * *'   # 12:52 WIB
    - cron: '33 6 * * *'   # 13:33 WIB
    - cron: '58 6 * * *'   # 13:58 WIB

    # Sore & Malam (15:00 - 22:00 WIB = 08:00 - 15:00 UTC)
    - cron: '19 8 * * *'   # 15:19 WIB
    - cron: '41 9 * * *'   # 16:41 WIB
    - cron: '8 11 * * *'   # 18:08 WIB
    - cron: '36 13 * * *'  # 20:36 WIB

  # Bisa juga dijalankan manual dari GitHub Actions tab
  workflow_dispatch:

jobs:
  green-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          gpg --list-secret-keys --keyid-format LONG

      - name: Configure Git
        run: |
          git config user.name "ducky"
          git config user.email "dedukwijaya@gmail.com"
          git config user.signingkey F77FA5C7E92588A756B36E606FD5D53407B2C619
          git config commit.gpgsign true

      - name: Generate commit & push
        run: |
          export TZ="Asia/Jakarta"
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S %Z")
          DAY=$(date +"%A")
          RANDOM_MSG_INDEX=$((RANDOM % 10))

          # Pesan commit acak agar terlihat natural
          MESSAGES=(
            "chore: update activity log"
            "docs: refresh README"
            "chore: sync latest changes"
            "docs: update project notes"
            "chore: routine maintenance"
            "docs: minor content update"
            "chore: housekeeping"
            "docs: keep things fresh"
            "chore: daily sync"
            "docs: update timestamp"
          )

          COMMIT_MSG="${MESSAGES[$RANDOM_MSG_INDEX]}"

          # Update README dengan timestamp
          echo "<!-- Auto-updated: $TIMESTAMP -->" > README.md
          echo "" >> README.md
          echo "# Activity Log" >> README.md
          echo "" >> README.md
          echo "Last sync: **$TIMESTAMP**" >> README.md
          echo "" >> README.md
          echo "> Automated daily activity tracker" >> README.md

          git add README.md
          git commit -S -m "$COMMIT_MSG [$TIMESTAMP]" || echo "Nothing to commit"
          git push origin main
